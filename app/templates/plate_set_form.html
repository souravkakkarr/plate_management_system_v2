{% extends "base.html" %}
{% block content %}
<div class="page-head"><h1>PLATE SET MASTER ENTRY</h1></div>
{% for e in errors %}<div class="alert alert-error">{{ e }}</div>{% endfor %}
{% if saved %}<div class="modal-lite"><div class="modal-card"><h3>PLATE SET SAVED SUCCESSFULLY</h3><div class="btn-row"><a class="btn primary" href="/dashboard">OK</a><a class="btn" href="/plate-sets/create">CREATE ANOTHER MASTER</a></div></div></div>{% endif %}
<div class="card">
  <form method="post" class="form-grid">
    <div class="form-span"><div class="auto-box">NEXT AVAILABLE LOCATION: <strong>{{ next_location }}</strong></div></div>
    <label>Date of Receiving<input name="receiving_date" placeholder="DD/MM/YYYY" required></label>
    <label>Job ID<input name="job_id" required></label>
    <label class="span-2">Job Name<textarea name="job_name" rows="2" required></textarea></label>
    <label class="span-2">Party / Customer Name<textarea name="party_name" rows="2" required></textarea></label>
    <label>Plate Set ID<input name="plate_set_id" required></label>
    <label>No. of Plates in Set<input type="number" name="no_of_plates" required></label>
    <label>Plate Size<select name="plate_size" required><option value="770X1080">770X1080</option><option value="790X1080">790X1080</option></select></label>
    <label>Gripper Size (MM)<input type="number" name="gripper_size_mm" required></label>
    <label class="span-2">Color Details / Sequence<textarea name="color_details" rows="2" required></textarea></label>
    <label class="span-2">Remarks<textarea name="remarks" rows="2"></textarea></label>
    <label>Plate From Party<select name="plate_from_party" class="party-select" data-target="plateVendorFields"><option value="YES">YES</option><option value="NO">NO</option></select></label>
    <div id="plateVendorFields" class="span-2 conditional-group hidden"><div class="nested-grid"><label>Vendor Name<textarea name="vendor_name" rows="2"></textarea></label><label>Vendor Side Unique Plate ID<input name="vendor_plate_id"></label></div></div>
    <div class="form-span"><button class="btn primary" type="submit">SAVE PLATE SET</button></div>
  </form>
</div>
{% endblock %}
