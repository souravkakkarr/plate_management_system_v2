{% extends "base.html" %}
{% block content %}
<div class="page-head"><h1>REPLACEMENT PLATE MASTER ENTRY</h1></div>
{% for e in errors %}<div class="alert alert-error">{{ e }}</div>{% endfor %}
{% if saved %}<div class="modal-lite"><div class="modal-card"><h3>REPLACEMENT PLATE SAVED SUCCESSFULLY</h3><div class="btn-row"><a class="btn primary" href="/dashboard">OK</a><a class="btn" href="/replacement-plates/create">CREATE ANOTHER MASTER</a></div></div></div>{% endif %}
<div class="card">
  <form method="post" class="form-grid">
    <label>Replacement Plate Receiving Date<input name="receiving_date" placeholder="DD/MM/YYYY" required></label>
    <label>Job ID<input name="job_id" id="replacementJobId" required></label>
    <div class="form-span auto-preview"><div>Plate Set ID: <strong id="plateSetPreview">-</strong></div><div>Location ID: <strong id="locationPreview">-</strong></div></div>
    <label>Colour of Replacement<select name="color" required><option value="CYAN">CYAN</option><option value="MAGENTA">MAGENTA</option><option value="YELLOW">YELLOW</option><option value="BLACK">BLACK</option><option value="PANTONE">PANTONE</option></select></label>
    <label>Plate From Party<select name="plate_from_party" class="party-select" data-target="replacementVendorFields"><option value="YES">YES</option><option value="NO">NO</option></select></label>
    <div id="replacementVendorFields" class="span-2 conditional-group hidden"><div class="nested-grid"><label>Vendor Name<textarea name="vendor_name" rows="2"></textarea></label><label>Vendor Side Unique Plate ID<input name="vendor_plate_id"></label></div></div>
    <div class="form-span"><button class="btn primary" type="submit">SAVE REPLACEMENT PLATE</button></div>
  </form>
</div>
{% endblock %}
