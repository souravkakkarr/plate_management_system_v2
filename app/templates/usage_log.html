{% extends "base.html" %}
{% block content %}
<div class="page-head"><h1>USAGE LOG</h1></div>
<div class="card"><form method="get" class="inline-form"><input name="plate_set_id" value="{{ plate_set_id }}" placeholder="FILTER BY PLATE SET ID"><button class="btn primary" type="submit">FILTER</button></form></div>
<div class="card"><h2>ADD USAGE ENTRY</h2><form method="post" class="form-grid"><label>Plate Set ID<input name="plate_set_id" required></label><label>Action<select name="action"><option value="IN">IN</option><option value="OUT">OUT</option></select></label><label class="span-2">Remarks<textarea name="remarks" rows="2"></textarea></label><div class="form-span"><button class="btn primary" type="submit">SAVE ENTRY</button></div></form></div>
<div class="card"><div class="table-wrap"><table><thead><tr><th>DATE</th><th>TIME</th><th>PLATE SET ID</th><th>ACTION</th><th>REMARKS</th></tr></thead><tbody>{% for l in logs %}<tr><td>{{ l.action_date }}</td><td>{{ l.action_time }}</td><td>{{ l.plate_set_id }}</td><td>{{ l.action }}</td><td>{{ l.remarks }}</td></tr>{% endfor %}</tbody></table></div></div>
{% endblock %}
