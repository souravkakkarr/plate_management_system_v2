<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title }}</title>
  <link rel="stylesheet" href="/static/css/style.css">
  <script defer src="/static/js/app.js"></script>
</head>
<body>
  <div class="layout">
    {% if user %}
    <aside class="sidebar">
      <div class="brand">PLATE MANAGEMENT</div>
      <div class="userbox">
        <div class="user-role">{{ user.role.replace('_',' ') }}</div>
        <div class="user-name">{{ user.full_name }}</div>
        <div class="user-email">{{ user.email }}</div>
      </div>
      <nav class="nav">
        {% for label, href in menu_items %}
          <a class="nav-link" href="{{ href }}">{{ label }}</a>
        {% endfor %}
        <a class="nav-link logout" href="/logout">LOGOUT</a>
      </nav>
    </aside>
    {% endif %}
    <main class="main {% if not user %}main-full{% endif %}">
      {% block content %}{% endblock %}
    </main>
  </div>
</body>
</html>
